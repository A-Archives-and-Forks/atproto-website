-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1400" role="img" aria-label="Off Protocol — placeholder cover">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f1a"/>
      <stop offset="100%" stop-color="#1a2540"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="1400" fill="url(#g)"/>
  <text x="700" y="640" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="120" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="8">OFF</text>
  <text x="700" y="800" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="120" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="8">PROTOCOL</text>
  <text x="700" y="920" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="32" fill="#7da3ff" text-anchor="middle" letter-spacing="4">PLACEHOLDER · REPLACE BEFORE LAUNCH</text>
</svg>
