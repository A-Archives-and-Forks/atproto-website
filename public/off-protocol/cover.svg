<!-- public/off-protocol/cover.svg -->
<!--
  TODO(launch): Replace with the real Off Protocol cover art before
  submitting the feed to Apple Podcasts or Spotify.

  Apple requires JPEG/PNG, square, between 1400×1400 and 3000×3000 pixels.
  When swapping, update SHOW.coverImage in src/lib/episodes.ts to the new
